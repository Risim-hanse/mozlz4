name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc make

      - name: Build and test
        if: runner.os != 'Windows'
        run: make clean && make test

      - name: Build and test with sanitizers
        if: runner.os != 'Windows'
        run: |
          make clean
          make test SANITIZE=1

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make clean && make test

  build-linux:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make all

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mozlz4-linux-x86_64
          path: mozlz4
          retention-days: 30

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc make

      - name: Build
        shell: msys2 {0}
        run: make all

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mozlz4-windows-x86_64
          path: mozlz4.exe
          retention-days: 30

  build-macos:
    needs: test
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact: mozlz4-macos-x86_64
          - arch: arm64
            artifact: mozlz4-macos-arm64
    name: build-macos (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make all ARCH=${{ matrix.arch }}

      - name: Test
        run: make test ARCH=${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: mozlz4
          retention-days: 30

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cd artifacts
          tar czf ../mozlz4-linux-x86_64.tar.gz -C mozlz4-linux-x86_64 mozlz4
          cd mozlz4-windows-x86_64
          zip ../mozlz4-windows-x86_64.zip mozlz4.exe
          cd ..
          tar czf ../mozlz4-macos-x86_64.tar.gz -C mozlz4-macos-x86_64 mozlz4
          tar czf ../mozlz4-macos-arm64.tar.gz -C mozlz4-macos-arm64 mozlz4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mozlz4-linux-x86_64.tar.gz
            mozlz4-windows-x86_64.zip
            mozlz4-macos-x86_64.tar.gz
            mozlz4-macos-arm64.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}

  fuzz:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Fuzz (60s)
        run: make fuzz
